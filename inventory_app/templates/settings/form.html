{% extends "layouts/base_inv.html" %}
{% block title %}ERP Settings{% endblock %}
{% block page_title %}ERP Settings{% endblock %}
{% block content %}
<div class="card" style="max-width:800px;">
  <form method="POST" class="form">
    <h4 style="margin-bottom:16px;color:#374151;border-bottom:2px solid #e5e7eb;padding-bottom:8px;">&#9881; Flow Control</h4>

    <div class="form-row" style="grid-template-columns:1fr 1fr;gap:24px;">
      <div class="form-group">
        <label>Purchase Flow</label>
        <div style="display:flex;gap:16px;margin-top:6px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="radio" name="purchase_flow" value="with_po" {{ 'checked' if s.purchase_flow == 'with_po' else '' }}>
            <strong>With PO</strong><br><small style="color:#6b7280;">PO &rarr; Receive &rarr; Invoice</small>
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="radio" name="purchase_flow" value="direct_invoice" {{ 'checked' if s.purchase_flow == 'direct_invoice' else '' }}>
            <strong>Direct Invoice</strong><br><small style="color:#6b7280;">Create Purchase Invoice directly</small>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Sales Flow</label>
        <div style="display:flex;gap:16px;margin-top:6px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="radio" name="sales_flow" value="with_so" {{ 'checked' if s.sales_flow == 'with_so' else '' }}>
            <strong>With SO</strong><br><small style="color:#6b7280;">SO &rarr; Dispatch &rarr; Invoice</small>
          </label>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
            <input type="radio" name="sales_flow" value="direct_invoice" {{ 'checked' if s.sales_flow == 'direct_invoice' else '' }}>
            <strong>Direct Invoice</strong><br><small style="color:#6b7280;">Create Sales Invoice directly</small>
          </label>
        </div>
      </div>
    </div>

    <h4 style="margin:24px 0 16px;color:#374151;border-bottom:2px solid #e5e7eb;padding-bottom:8px;">&#128202; Inventory Valuation</h4>

    <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>Valuation Method</label>
        <select name="valuation_method" class="form-control focus-ring">
          <option value="weighted_average" {{ 'selected' if s.valuation_method == 'weighted_average' else '' }}>Weighted Average</option>
          <option value="fifo" {{ 'selected' if s.valuation_method == 'fifo' else '' }}>FIFO</option>
        </select>
      </div>
      <div class="form-group">
        <label>Decimal Places</label>
        <input type="number" name="decimal_places" class="form-control focus-ring" value="{{ s.decimal_places }}" min="0" max="6">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;margin-top:24px;">
          <input type="checkbox" name="allow_negative_stock" {{ 'checked' if s.allow_negative_stock else '' }}>
          Allow Negative Stock
        </label>
      </div>
    </div>

    <div class="form-actions" style="margin-top:24px;padding-top:16px;border-top:1px solid #e5e7eb;">
      <button type="submit" class="btn btn-primary">Save Settings</button>
      <a href="{{ url_for('inv_auth.dashboard') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
