{% extends "layouts/base_inv.html" %}
{% block title %}{{ 'Edit' if product else 'New' }} Product{% endblock %}
{% block page_title %}{{ 'Edit' if product else 'New' }} Product{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
  <form method="POST" class="form">
    <div class="form-row">
      <div class="form-group">
        <label>SKU *</label>
        <input type="text" name="sku" class="form-control focus-ring" required value="{{ product.sku if product else '' }}">
      </div>
      <div class="form-group">
        <label>Unit</label>
        <input type="text" name="unit" class="form-control focus-ring" value="{{ product.unit if product else 'pcs' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Name *</label>
      <input type="text" name="name" class="form-control focus-ring" required value="{{ product.name if product else '' }}">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" class="form-control focus-ring" rows="3">{{ product.description if product else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select name="category_id" class="form-control focus-ring">
        <option value="">None</option>
        {% for c in categories %}
        <option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Unit Price</label>
        <input type="number" step="0.01" name="unit_price" class="form-control focus-ring" value="{{ product.unit_price if product else '0' }}">
      </div>
      <div class="form-group">
        <label>Cost Price</label>
        <input type="number" step="0.01" name="cost_price" class="form-control focus-ring" value="{{ product.cost_price if product else '0' }}">
      </div>
      <div class="form-group">
        <label>Reorder Level</label>
        <input type="number" name="reorder_level" class="form-control focus-ring" value="{{ product.reorder_level if product else '0' }}">
      </div>
    </div>
    {% if not product %}
    <div class="form-group">
      <label>Opening Stock</label>
      <input type="number" name="current_stock" class="form-control focus-ring" value="0">
    </div>
    {% endif %}
    {% if product %}
    <div class="form-group">
      <label><input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %}> Active</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Update' if product else 'Create' }}</button>
      <a href="{{ url_for('inv_products.list_products') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
