{% extends "layouts/base_inv.html" %}
{% block title %}Purchase Order{% endblock %}
{% block page_title %}Purchase Order{% endblock %}
{% block extra_css %}
<style>
:root {
  --qb-bg: #f5f5f5; --qb-card: #ffffff; --qb-border: #d1d5db;
  --qb-text: #1f2937; --qb-text-muted: #6b7280; --qb-text-light: #9ca3af;
  --qb-primary: #2563eb; --qb-primary-hover: #1d4ed8;
  --qb-input-border: #d1d5db; --qb-table-header-bg: #f3f4f6; --qb-table-border: #e5e7eb;
}
body { background: var(--qb-bg); }
.invoice-wrap { max-width: 1000px; margin: 0 auto; padding: 20px 0; }
.qb-card { background: var(--qb-card); margin-bottom: 1px; border: none; }
.qb-card .card-header { padding: 14px 20px; background: var(--qb-table-header-bg); border-bottom: 1px solid var(--qb-table-border); font-size: 13px; font-weight: 600; color: var(--qb-text); letter-spacing: 0.3px; }
.qb-card .card-body { padding: 16px 20px; }
.qb-field { margin-bottom: 10px; }
.qb-field label { display: block; font-size: 11px; font-weight: 600; color: var(--qb-text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.qb-field .qb-input { display: block; width: 100%; padding: 6px 8px; font-size: 13px; color: var(--qb-text); background: #fff; border: 1px solid var(--qb-input-border); box-sizing: border-box; }
.qb-field .qb-input:focus { border-color: var(--qb-primary); outline: none; box-shadow: 0 0 0 2px rgba(37,99,235,.1); }
.qb-field select.qb-input { cursor: pointer; }
.qb-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.qb-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.table-wrap { overflow-x: auto; border: 1px solid var(--qb-table-border); }
.qb-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
.qb-table th { background: var(--qb-table-header-bg); padding: 7px 6px; font-size: 10px; font-weight: 600; color: var(--qb-text-muted); text-align: left; border-bottom: 2px solid var(--qb-table-border); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
.qb-table td { padding: 3px 6px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
.qb-table .ri { width: 100%; border: 1px solid transparent; padding: 4px 5px; font-size: 12px; background: transparent; box-sizing: border-box; }
.qb-table .ri:focus { border-color: var(--qb-primary); box-shadow: 0 0 0 2px rgba(37,99,235,.1); outline: none; background: #fff; }
.qb-table .ri.rc { background: transparent; color: var(--qb-text); font-weight: 600; border: none; }
.qb-table .rn { width: 24px; text-align: center; color: var(--qb-text-light); font-size: 11px; }
.qb-table tr:hover td { background: #fafafa; }
.action-bar { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; padding: 12px 0; border-top: 1px solid var(--qb-table-border); }
.btn-qb { padding: 8px 22px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-qb-primary { background: var(--qb-primary); color: #fff; }
.btn-qb-primary:hover { background: var(--qb-primary-hover); }
.btn-qb-outline { background: #fff; color: var(--qb-text); border: 1px solid var(--qb-input-border); }
.btn-qb-outline:hover { background: #f3f4f6; }
.autocomplete-wrap .ac-results { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--qb-input-border); border-top: none; z-index: 100; max-height: 180px; overflow-y: auto; box-shadow: 0 4px 12px rgba(0,0,0,.08); display: none; }
.autocomplete-wrap .ac-results.show { display: block; }
.autocomplete-wrap .ac-item { padding: 6px 10px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; }
.autocomplete-wrap .ac-item:hover { background: #f9fafb; }
.autocomplete-wrap .ac-item .ac-name { font-weight: 500; }
.autocomplete-wrap .ac-item .ac-sku { color: var(--qb-text-light); font-size: 11px; }
@media print { .sidebar, .topbar, .action-bar, .ac-results { display: none !important; } body { background: #fff; } }
</style>
{% endblock %}

{% block content %}
<div class="invoice-wrap">
  <form method="POST" id="poForm">
    <div class="qb-card">
      <div class="card-header">Purchase Order</div>
      <div class="card-body">
        <div class="qb-row-2">
          <div class="autocomplete-wrap qb-field">
            <label>Supplier</label>
            <select name="supplier_id" class="qb-input" required>
              <option value="">Select Supplier</option>
              {% for s in suppliers %}
              <option value="{{ s.id }}">{{ s.name }} ({{ s.city or '' }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="qb-field">
            <label>Expected Date</label>
            <input type="date" name="expected_date" class="qb-input">
          </div>
        </div>
        <div class="qb-field">
          <label>Notes</label>
          <textarea name="notes" class="qb-input" rows="2"></textarea>
        </div>
      </div>
    </div>

    <div class="qb-card">
      <div class="card-header">Items</div>
      <div class="card-body" style="padding:8px 0;">
        <div class="table-wrap">
          <table class="qb-table">
            <thead>
              <tr>
                <th style="width:24px;">#</th>
                <th style="min-width:60px;">SKU</th>
                <th style="min-width:180px;">Product</th>
                <th style="width:70px;">Quantity</th>
                <th style="width:90px;">Unit Price</th>
                <th style="width:100px;">Total</th>
                <th style="width:24px;"></th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
        <button type="button" class="btn-qb btn-qb-outline" onclick="addRow({})" style="margin-top:8px;margin-left:8px;">+ Add Row</button>
      </div>
    </div>

    <div class="qb-card">
      <div class="card-body">
        <div style="text-align:right;padding:8px 0;">
          <span style="font-size:13px;color:var(--qb-text-muted);">Total Amount: </span>
          <span style="font-size:20px;font-weight:800;color:var(--qb-text);" id="poTotal">0.00</span>
        </div>
      </div>
    </div>

    <div class="action-bar">
      <button type="submit" class="btn-qb btn-qb-primary">&#128190; Create PO</button>
      <a href="{{ url_for('inv_purchases.list_purchases') }}" class="btn-qb btn-qb-outline">Cancel</a>
    </div>
  </form>
</div>

<script>
var products = {{ products|tojson }};
var rowCount = 0;

function addRow(data) {
  var tbody = document.getElementById('itemsBody');
  var tr = document.createElement('tr');
  rowCount++;
  tr.innerHTML =
    '<td class="rn">' + rowCount + '</td>' +
    '<td><input type="text" class="ri" data-col="code" placeholder="SKU" value="' + ((data && data.sku) || '') + '"></td>' +
    '<td><select name="product_id[]" class="ri" data-col="product" required style="cursor:pointer;">' +
      '<option value="">Select Product</option>' +
      products.map(function(p) {
        var sel = (data && data.product_id == p.id) ? 'selected' : '';
        return '<option value="' + p.id + '" data-price="' + p.unit_price + '" ' + sel + '>' + p.name + ' (' + p.sku + ')</option>';
      }).join('') +
    '</select></td>' +
    '<td><input type="number" name="quantity[]" class="ri" data-col="quantity" value="' + ((data && data.quantity) || 1) + '" min="1" required></td>' +
    '<td><input type="number" step="0.01" name="unit_price[]" class="ri" data-col="unit_price" value="' + ((data && data.unit_price) || 0) + '" min="0" required></td>' +
    '<td><input type="text" class="ri rc" data-col="total" value="' + ((data && (data.quantity * data.unit_price).toFixed(2)) || '0.00') + '" readonly></td>' +
    '<td><button type="button" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:16px;padding:2px;" onclick="removeRow(this)">&times;</button></td>';
  tbody.appendChild(tr);

  tr.querySelectorAll('input[data-col], select[data-col]').forEach(function(el) {
    el.addEventListener('input', function() { recalcRow(tr); recalcTotal(); });
    el.addEventListener('change', function() { recalcRow(tr); recalcTotal(); });
  });

  var sel = tr.querySelector('select[data-col="product"]');
  if (sel) {
    sel.addEventListener('change', function() {
      var opt = this.options[this.selectedIndex];
      var price = opt?.dataset?.price || 0;
      var priceInput = tr.querySelector('[data-col="unit_price"]');
      if (priceInput && !parseFloat(priceInput.value)) { priceInput.value = price; recalcRow(tr); recalcTotal(); }
    });
  }
  return tr;
}

function removeRow(btn) {
  var tr = btn.closest('tr');
  var tbody = document.getElementById('itemsBody');
  if (tbody.children.length <= 1) return;
  tr.remove();
  document.querySelectorAll('#itemsBody .rn').forEach(function(el, i) { el.textContent = i + 1; });
  recalcTotal();
}

function recalcRow(tr) {
  var qty = parseFloat(tr.querySelector('[data-col="quantity"]').value) || 0;
  var price = parseFloat(tr.querySelector('[data-col="unit_price"]').value) || 0;
  tr.querySelector('[data-col="total"]').value = (qty * price).toFixed(2);
}

function recalcTotal() {
  var total = 0;
  document.querySelectorAll('#itemsBody tr').forEach(function(tr) {
    total += parseFloat(tr.querySelector('[data-col="total"]').value) || 0;
  });
  document.getElementById('poTotal').textContent = total.toFixed(2);
}

{% if order %}
  {% for item in order.items.all() %}
addRow({ product_id: {{ item.product_id }}, quantity: {{ item.quantity }}, unit_price: {{ item.unit_price }}, sku: '{{ item.product.sku if item.product else '' }}' });
  {% endfor %}
{% else %}
addRow({});
{% endif %}
</script>
{% endblock %}
