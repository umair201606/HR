{% extends "layouts/base_inv.html" %}
{% block title %}{{ 'Edit' if account else 'New' }} Account{% endblock %}
{% block page_title %}{{ 'Edit' if account else 'New' }} Chart of Account{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label>Code *</label>
        <input type="text" name="code" class="form-control" required
               value="{{ account.code if account else '' }}" {{ 'readonly' if account else '' }}>
      </div>
      <div class="form-group">
        <label>Name *</label>
        <input type="text" name="name" class="form-control" required
               value="{{ account.name if account else '' }}">
      </div>
      <div class="form-group">
        <label>Type *</label>
        <select name="type" class="form-control" required>
          <option value="">-- Select --</option>
          {% for t in types %}
          <option value="{{ t }}" {{ 'selected' if account and account.type == t else '' }}>{{ t|title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Parent Account</label>
        <select name="parent_id" class="form-control">
          <option value="">None (Top Level)</option>
          {% for p in parents %}
          <option value="{{ p.id }}" {{ 'selected' if account and account.parent_id == p.id else '' }}>
            {{ p.code }} - {{ p.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" class="form-control" rows="3">{{ account.description if account else '' }}</textarea>
      </div>
      {% if account %}
      <div class="form-group">
        <label>
          <input type="checkbox" name="is_active" value="1" {{ 'checked' if account.is_active else '' }}>
          Active
        </label>
      </div>
      {% endif %}
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ 'Update' if account else 'Create' }}</button>
        <a href="{{ url_for('inv_chart_of_accounts.list_accounts') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
