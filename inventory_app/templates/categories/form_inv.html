{% extends "layouts/base_inv.html" %}
{% block title %}{{ 'Edit' if category else 'New' }} Category{% endblock %}
{% block page_title %}{{ 'Edit' if category else 'New' }} Category{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
  <form method="POST" class="form">
    <div class="form-group">
      <label>Name *</label>
      <input type="text" name="name" class="form-control focus-ring" required value="{{ category.name if category else '' }}">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description" class="form-control focus-ring" rows="3">{{ category.description if category else '' }}</textarea>
    </div>
    <div class="form-group">
      <label>Parent Category</label>
      <select name="parent_id" class="form-control focus-ring">
        <option value="">None</option>
        {% for p in parents %}
        <option value="{{ p.id }}" {% if category and category.parent_id == p.id %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>
    {% if category %}
    <div class="form-group">
      <label><input type="checkbox" name="is_active" {% if category.is_active %}checked{% endif %}> Active</label>
    </div>
    {% endif %}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ 'Update' if category else 'Create' }}</button>
      <a href="{{ url_for('inv_categories.list_categories') }}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
