{% extends "layouts/base.html" %}
{% block title %}Apply Leave - HR Portal{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Apply for Leave</h1>
</div>
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group">
            <label>Leave Type</label>
            <select name="leave_type" class="form-control" required>
                <option value="">Select type...</option>
                {% for lt in leave_types %}
                <option value="{{ lt.id }}">{{ lt.name }} ({{ lt.code }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" name="start_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date" name="end_date" class="form-control" required>
            </div>
        </div>
        <div class="form-group">
            <label>Reason</label>
            <textarea name="reason" class="form-control form-textarea" required placeholder="Reason for leave..."></textarea>
        </div>
        <div class="form-group">
            <label><input type="checkbox" name="is_half_day"> Half Day</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit Request</button>
        <a href="{{ url_for('leave.index') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
