{% extends "layouts/base.html" %}
{% block title %}{{ 'Edit' if user else 'Add' }} User - HR Portal{% endblock %}
{% block content %}
<div class="page-header">
    <h1>{{ 'Edit' if user else 'Add' }} User</h1>
    <a href="{{ url_for('auth.user_list') }}" class="btn btn-sm btn-outline">&larr; Back to Users</a>
</div>
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Employee Code *</label>
                <input type="text" name="employee_code" class="form-control" required value="{{ user.employee_code if user else '' }}" {{ 'readonly' if user }}>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" class="form-control" required value="{{ user.email if user else '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" name="full_name" class="form-control" required value="{{ user.full_name if user else '' }}">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Role *</label>
                <select name="role_id" class="form-control" required>
                    <option value="">Select Role</option>
                    {% for r in roles %}
                    <option value="{{ r.id }}" {{ 'selected' if user and user.role_id == r.id }}>{{ r.name|title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Manager</label>
                <select name="manager_id" class="form-control">
                    <option value="">None</option>
                    {% for m in managers %}
                    <option value="{{ m.id }}" {{ 'selected' if user and user.manager_id == m.id }}>{{ m.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation" class="form-control" value="{{ user.designation if user else '' }}">
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" class="form-control" value="{{ user.department if user else '' }}">
            </div>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ user.phone if user else '' }}">
        </div>
        {% if user %}
        <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <label style="margin:0;">Active</label>
            <input type="checkbox" name="is_active" value="1" {{ 'checked' if user.is_active }}>
        </div>
        <div class="form-group">
            <label>New Password <span style="font-weight:400;color:var(--muted);">(leave blank to keep current)</span></label>
            <input type="password" name="password" class="form-control" minlength="4">
        </div>
        {% else %}
        <div class="form-group">
            <label>Password *</label>
            <input type="password" name="password" class="form-control" required minlength="4">
        </div>
        {% endif %}
        <button type="submit" class="btn btn-primary">{{ 'Update' if user else 'Create' }} User</button>
        <a href="{{ url_for('auth.user_list') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
