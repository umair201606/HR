<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Solarkon ERP{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body style="background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;">
    <div style="width:100%;max-width:700px;">
        <div style="text-align:center;margin-bottom:32px;">
            <div style="width:64px;height:64px;background:#1f2937;color:#fff;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin-bottom:12px;">S</div>
            <h1 style="margin:0;font-size:24px;font-weight:700;color:#1f2937;">Solarkon ERP</h1>
            <p style="margin:4px 0 0;color:#6b7280;font-size:14px;">{{ current_user.full_name }} &bull; {{ current_user.get_role_name()|title }}</p>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            {% block content %}{% endblock %}
        </div>
        <div style="text-align:center;margin-top:24px;">
            <a href="{{ url_for('auth.logout') }}" style="font-size:13px;color:#9ca3af;text-decoration:none;">Logout</a>
        </div>
    </div>
</body>
</html>
