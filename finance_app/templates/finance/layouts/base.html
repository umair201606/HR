<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Financial Reports{% endblock %} - SolarKon ERP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }
    .finance-sidebar { background: #1e293b; min-height: 100vh; width: 240px; position: fixed; top: 0; left: 0; }
    .finance-sidebar a { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: #94a3b8; text-decoration: none; font-size: 14px; transition: all .15s; }
    .finance-sidebar a:hover, .finance-sidebar a.active { background: #334155; color: #fff; }
    .finance-sidebar .logo { padding: 20px; color: #fff; font-size: 18px; font-weight: 700; border-bottom: 1px solid #334155; }
    .finance-main { margin-left: 240px; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 24px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; text-decoration: none; }
    .btn-primary { background: #1d4ed8; color: #fff; }
    .btn-primary:hover { background: #1e40af; }
    .btn-success { background: #059669; color: #fff; }
    .btn-success:hover { background: #047857; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #cbd5e1; color: #475569; }
    .btn-outline:hover { background: #f1f5f9; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    table.report-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.report-table th { background: #1e293b; color: #fff; padding: 10px 12px; text-align: left; font-weight: 600; }
    table.report-table td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; }
    table.report-table tr:hover td { background: #f8fafc; }
    table.report-table .num { text-align: right; font-variant-numeric: tabular-nums; }
    /* ── Financial-statement styling (P&L, cash flow, TB, BS, ledger) ── */
    .report-sheet { padding-top: 20px; }
    .report-head { display: flex; justify-content: space-between; align-items: flex-start;
                   border-bottom: 3px double #1e293b; padding-bottom: 14px; margin-bottom: 16px; }
    .report-company { font-size: 12px; font-weight: 700; letter-spacing: .8px;
                      text-transform: uppercase; color: #64748b; }
    .report-title-lg { font-size: 22px; font-weight: 800; color: #0f172a; margin: 2px 0; }
    .report-sub { font-size: 13px; font-weight: 500; color: #64748b; }
    .report-period { font-size: 13px; color: #475569; }
    .report-footnote { font-size: 12px; color: #94a3b8; margin-top: 12px; }
    .report-footnote a { color: #1d4ed8; }
    table.statement thead th { position: sticky; top: 0; z-index: 5; }
    table.statement .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                            font-size: 12px; color: #64748b; }
    table.statement .indent { padding-left: 28px; }
    table.statement tr.sec-head td { background: #f1f5f9; font-weight: 700; font-size: 12px;
                                     letter-spacing: .6px; text-transform: uppercase; color: #334155;
                                     border-top: 1px solid #cbd5e1; }
    table.statement tr.sec-total td { font-weight: 600; border-top: 1px solid #94a3b8;
                                      background: #fafafa; }
    table.statement tr.profit-line td { font-weight: 800; font-size: 14px; color: #0f172a;
                                        background: #eff6ff; border-top: 2px solid #1e293b;
                                        border-bottom: 2px solid #1e293b; }
    table.statement tr.profit-line.neg td { color: #b91c1c; background: #fef2f2; }
    table.statement tr.grand-total td { font-weight: 800; font-size: 15px; background: #1e293b;
                                        color: #fff; }
    table.statement tr.subtotal-row td { font-weight: 700; background: #f8fafc;
                                         border-top: 1px solid #94a3b8; }
    table.statement tr.recon-line td { font-size: 12px; color: #475569; background: #f8fafc; }
    table.statement tr.recon-bad td { color: #b91c1c; background: #fef2f2; font-weight: 600; }
    table.statement tr.opening-row td, table.statement tr.closing-row td {
        font-weight: 600; background: #f8fafc; font-style: italic; }
    @media print {
      .no-print, aside, nav { display: none !important; }
      .card { box-shadow: none !important; border: none !important; }
      table.statement thead th { position: static; }
    }
    input, select { border: 1px solid #cbd5e1; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #1d4ed8; box-shadow: 0 0 0 3px rgba(29,78,216,.15); }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .badge-green { background: #d1fae5; color: #065f46; }
    .badge-purple { background: #ede9fe; color: #5b21b6; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); text-align: center; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #1e293b; }
    .stat-card .label { font-size: 13px; color: #64748b; margin-top: 4px; }
    @media print { .no-print { display: none !important; } body { background: #fff; } .finance-sidebar { display: none; } .finance-main { margin-left: 0; padding: 16px; } }
  </style>
</head>
<body>
  <nav class="finance-sidebar no-print">
    <div class="logo"><i class="fas fa-coins mr-2"></i>Finance</div>
    <a href="{{ url_for('finance.dashboard') }}" class="{% if request.endpoint == 'finance.dashboard' %}active{% endif %}">
      <i class="fas fa-chart-pie"></i> Dashboard
    </a>
    <a href="{{ url_for('finance.ledger') }}" class="{% if request.endpoint == 'finance.ledger' %}active{% endif %}">
      <i class="fas fa-book"></i> General Ledger
    </a>
    <a href="{{ url_for('finance.trial_balance') }}" class="{% if request.endpoint == 'finance.trial_balance' %}active{% endif %}">
      <i class="fas fa-balance-scale"></i> Trial Balance
    </a>
    <a href="{{ url_for('finance.profit_loss') }}" class="{% if request.endpoint == 'finance.profit_loss' %}active{% endif %}">
      <i class="fas fa-chart-line"></i> P&L Statement
    </a>
    <a href="{{ url_for('finance.balance_sheet') }}" class="{% if request.endpoint == 'finance.balance_sheet' %}active{% endif %}">
      <i class="fas fa-file-invoice"></i> Balance Sheet
    </a>
    <a href="{{ url_for('finance.socie') }}" class="{% if request.endpoint == 'finance.socie' %}active{% endif %}">
      <i class="fas fa-layer-group"></i> SOCIE
    </a>
    <a href="{{ url_for('finance.cash_flow') }}" class="{% if request.endpoint == 'finance.cash_flow' %}active{% endif %}">
      <i class="fas fa-money-bill-wave"></i> Cash Flow
    </a>
    <hr style="border-color:#334155;margin:12px 20px;">
    <a href="{{ url_for('finance_settings.index') }}" class="{% if request.endpoint and request.endpoint.startswith('finance_settings') %}active{% endif %}">
      <i class="fas fa-cog"></i> Settings
    </a>
    <a href="{{ url_for('inv_auth.dashboard') }}"><i class="fas fa-arrow-left"></i> Back to Inventory</a>
    <a href="{{ url_for('dashboard.hub') }}"><i class="fas fa-th"></i> ERP Hub</a>
  </nav>

  <main class="finance-main">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-slate-800">{% block heading %}Financial Reports{% endblock %}</h1>
      <div class="flex gap-2 no-print">
        {% block actions %}{% endblock %}
      </div>
    </div>
    {% include '_flash.html' %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
